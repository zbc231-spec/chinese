<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 聽寫大師 - 安全穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; touch-action: none; overflow: hidden; user-select: none; }
        .canvas-container { position: relative; background-color: white; border: 4px solid #ef4444; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .loader { border-top-color: #ef4444; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-4xl bg-white p-4 rounded-2xl shadow-sm mb-4 flex justify-between items-center border-b-4 border-red-200">
        <div class="flex flex-col">
            <span id="lesson-title" class="text-sm font-bold text-red-600">請選擇單元</span>
            <div class="flex items-center gap-2 mt-1">
                <div class="w-20 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-red-500 transition-all duration-500" style="width: 0%"></div>
                </div>
                <span id="progress-text" class="text-[10px] text-gray-400 font-bold">0/0</span>
            </div>
        </div>
        <div class="text-center">
            <span id="game-time" class="text-sm font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-lg italic">獎勵 0 秒</span>
        </div>
        <div class="flex gap-2">
            <button onclick="resetKey()" class="text-[10px] bg-slate-100 text-slate-400 px-2 py-1 rounded">重設 Key</button>
            <button onclick="location.reload()" class="text-xs bg-red-50 text-red-600 px-3 py-1 rounded-lg font-bold">選單</button>
        </div>
    </div>

    <div id="setup-screen" class="w-full max-w-2xl bg-white rounded-3xl shadow-xl p-8">
        <h2 class="text-2xl font-black text-slate-700 mb-6 text-center italic">AI 聽寫隨機考</h2>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="initLesson(1)" class="p-4 bg-red-50 border-2 border-red-100 text-red-700 rounded-2xl font-bold hover:bg-red-100 transition-all">第 1 課</button>
            <button onclick="initLesson(2)" class="p-4 bg-red-50 border-2 border-red-100 text-red-700 rounded-2xl font-bold hover:bg-red-100 transition-all">第 2 課</button>
            <button onclick="initLesson(3)" class="p-4 bg-red-50 border-2 border-red-100 text-red-700 rounded-2xl font-bold hover:bg-red-100 transition-all">第 3 課</button>
            <button onclick="initLesson(4)" class="p-4 bg-red-50 border-2 border-red-100 text-red-700 rounded-2xl font-bold hover:bg-red-100 transition-all">第 4 課</button>
            <button onclick="initLesson(5)" class="p-4 bg-red-50 border-2 border-red-100 text-red-700 rounded-2xl font-bold hover:bg-red-100 transition-all">第 5 課</button>
            <button onclick="initLesson(6)" class="p-4 bg-red-50 border-2 border-red-100 text-red-700 rounded-2xl font-bold hover:bg-red-100 transition-all">第 6 課</button>
        </div>
        <button onclick="initLesson('all')" class="w-full p-6 bg-slate-800 text-white rounded-3xl font-black text-xl shadow-lg active:scale-95 transition-all">🏆 1-6 課全範圍隨機考</button>
    </div>

    <div id="game-screen" class="w-full max-w-5xl hidden flex flex-col items-center">
        <div class="bg-white rounded-3xl shadow-xl p-6 w-full relative">
            <div class="flex justify-between items-center mb-6">
                <span class="font-black text-slate-400">請依照唸出的題目寫字</span>
                <button onclick="speak()" class="bg-red-500 text-white px-8 py-3 rounded-full font-bold shadow-lg active:scale-95 transition-all">🔈 唸題目</button>
            </div>

            <div id="canvas-wrapper" class="canvas-container overflow-hidden mx-auto touch-none">
                <canvas id="main-canvas" class="mx-auto block"></canvas>
                <div id="loading" class="absolute inset-0 bg-white/95 z-50 hidden flex flex-col items-center justify-center">
                    <div class="loader rounded-full border-4 border-gray-100 h-16 w-16 mb-4"></div>
                    <p class="text-red-600 font-bold text-xl animate-pulse">AI 老師正在閱卷...</p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4 mt-8">
                <button onclick="undo()" class="py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl active:bg-slate-200">← 回一步</button>
                <button onclick="clearCanvas()" class="py-4 bg-slate-50 text-slate-300 font-bold rounded-2xl">全清</button>
                <button id="submit-btn" onclick="submit()" class="py-4 bg-red-600 text-white font-black rounded-2xl shadow-xl active:bg-red-700 active:translate-y-1 transition-all">送出批改</button>
            </div>
        </div>
    </div>

    <div id="result-modal" class="fixed inset-0 bg-slate-900/90 hidden z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white rounded-[3rem] w-full max-w-sm p-10 text-center shadow-2xl scale-in">
            <div id="res-icon" class="text-9xl mb-4"></div>
            <h2 id="res-title" class="text-4xl font-black mb-4"></h2>
            <p id="res-msg" class="text-slate-500 mb-10 bg-slate-50 p-6 rounded-2xl italic leading-relaxed text-sm"></p>
            <button onclick="nextWord()" class="w-full bg-blue-600 text-white py-6 rounded-3xl font-black text-2xl shadow-xl active:scale-95 transition-all">下一題</button>
        </div>
    </div>

    <script>
        // --- 安全 Key 管理 ---
        let API_KEY = localStorage.getItem('gemini_dictation_key') || "";
        function resetKey() { localStorage.removeItem('gemini_dictation_key'); location.reload(); }

        const vocabData = {
            1: [{w:"音符",b:"ㄧㄣ ㄈㄨˊ"},{w:"坎坷",b:"ㄎㄢˇ ㄎㄜˇ"},{w:"澎湃",b:"ㄆㄥ ㄆㄞˋ"},{w:"無垠",b:"ㄨˊ ㄧㄣˊ"},{w:"丘陵",b:"ㄑㄧㄡ ㄌㄧㄥˊ"},{w:"瞭望",b:"ㄌㄧㄠˋ ㄨㄤˋ"},{w:"碧波",b:"ㄅㄧˋ ㄅㄛ"},{w:"盪漾",b:"ㄉㄤˋ ㄧㄤˋ"}],
            2: [{w:"山巒",b:"ㄕㄢ ㄌㄨㄢˊ"},{w:"隧道",b:"ㄙㄨㄟˋ ㄉㄠˋ"},{w:"綻放",b:"ㄓㄢˋ ㄈㄤˋ"},{w:"震動",b:"ㄓㄣˋ ㄉㄨㄥˋ"},{w:"顫抖",b:"ㄓㄣˋ ㄉㄡˇ"},{w:"覆蓋",b:"ㄈㄨˋ ㄍㄞˋ"},{w:"低吟",b:"ㄉㄧ ㄧㄣˊ"}],
            3: [{w:"寺廟",b:"ㄙˋ ㄇㄧㄠˋ"},{w:"點綴",b:"ㄉㄧㄢˇ ㄓㄨㄟˋ"},{w:"杜鵑",b:"ㄉㄨˋ ㄐㄩㄢ"},{w:"宇宙",b:"ㄩˇ ㄓㄡˋ"},{w:"屬於",b:"ㄕㄨˇ ㄩˊ"},{w:"返璞歸真",b:"ㄈㄢˇ ㄆㄨˊ ㄍㄨㄟ ㄓㄣ"}],
            4: [{w:"和藹",b:"ㄏㄜˊ ㄞˇ"},{w:"震撼",b:"ㄓㄣˋ ㄏㄢˋ"},{w:"尷尬",b:"ㄍㄢ ㄍㄚˋ"},{w:"恢復",b:"ㄏㄨㄟ ㄈㄨˋ"},{w:"奉獻",b:"ㄈㄥˋ ㄒㄧㄢˋ"}],
            5: [{w:"囑咐",b:"ㄓㄨˇ ㄈㄨˋ"},{w:"富裕",b:"ㄈㄨˋ ㄩˋ"},{w:"領悟",b:"ㄌㄧㄥˇ ㄨˋ"},{w:"演講",b:"ㄧㄢˇ ㄐㄧㄤˇ"},{w:"障礙",b:"ㄓㄤˋ ㄞˋ"}],
            6: [{w:"瀰漫",b:"ㄇㄧˊ ㄇㄢˋ"},{w:"暫時",b:"ㄗㄢˋ ㄕˊ"},{w:"煞有介事",b:"ㄕㄚˋ ㄧㄡˇ ㄐㄧㄝˋ ㄕˋ"},{w:"不置可否",b:"ㄅㄨˋ ㄓˋ ㄎㄜˇ ㄈㄡˇ"},{w:"聯絡簿",b:"ㄌㄧㄢˊ ㄌㄨㄛˋ ㄅㄨˋ"}]
        };

        let queue = [], retry = [], current = null, score = 0, totalCount = 0;
        let canvas, ctx, strokes = [], isDrawing = false;
        const BOX_S = 160, BPO_W = 60, GAP = 25;

        function initLesson(key) {
            if (!API_KEY) {
                const input = prompt("請輸入您的 Gemini API Key：\n(此金鑰僅會儲存在您的瀏覽器中，不會公開上傳)");
                if (!input) return;
                API_KEY = input.trim();
                localStorage.setItem('gemini_dictation_key', API_KEY);
            }

            let pool = key === 'all' ? Object.values(vocabData).flat() : vocabData[key];
            queue = [...pool].sort(() => Math.random() - 0.5);
            totalCount = queue.length;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            canvas = document.getElementById('main-canvas');
            ctx = canvas.getContext('2d');
            nextWord();
        }

        function drawGrids(word) {
            const len = word.length, unit = BOX_S + BPO_W;
            const w = Math.min((unit * len) + (GAP * (len + 1)), window.innerWidth - 20);
            const h = BOX_S + (GAP * 2);
            canvas.width = w * 2; canvas.height = h * 2;
            canvas.style.width = w + "px"; canvas.style.height = h + "px";
            ctx.scale(2, 2); ctx.clearRect(0, 0, w, h);
            for (let i = 0; i < len; i++) {
                const x = GAP + i * (unit + GAP), y = GAP;
                ctx.strokeStyle = "#fca5a5"; ctx.lineWidth = 2; ctx.strokeRect(x, y, BOX_S, BOX_S);
                ctx.setLineDash([5, 5]); ctx.beginPath();
                ctx.moveTo(x + BOX_S/2, y); ctx.lineTo(x + BOX_S/2, y + BOX_S);
                ctx.moveTo(x, y + BOX_S/2); ctx.lineTo(x + BOX_S, y + BOX_S/2);
                ctx.stroke(); ctx.setLineDash([]);
                ctx.strokeStyle = "#93c5fd"; ctx.strokeRect(x + BOX_S, y, BPO_W, BOX_S);
            }
            initDrawing();
        }

        function initDrawing() {
            ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#1e293b';
            const getP = (e) => {
                const r = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
                return { x, y };
            };
            const start = (e) => { isDrawing = true; strokes.push([]); const p = getP(e); strokes[strokes.length-1].push(p); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
            const move = (e) => { if(!isDrawing) return; if(e.cancelable) e.preventDefault(); const p = getP(e); strokes[strokes.length-1].push(p); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            canvas.onmousedown = start; canvas.onmousemove = move; window.onmouseup = () => isDrawing = false;
            canvas.ontouchstart = start; canvas.ontouchmove = move; canvas.ontouchend = () => isDrawing = false;
        }

        function speak() { if(!current) return; window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(current.w); u.lang = 'zh-TW'; u.rate = 0.8; window.speechSynthesis.speak(u); }

        function nextWord() {
            document.getElementById('result-modal').classList.add('hidden');
            if (queue.length === 0) {
                if (retry.length > 0) { queue = [...retry].sort(() => Math.random()-0.5); retry = []; }
                else { alert("🎉 太棒了！本單元全部完成！"); location.reload(); return; }
            }
            current = queue.shift(); strokes = [];
            drawGrids(current.w); setTimeout(speak, 500);
            updateUI();
        }

        function clearCanvas() { strokes = []; drawGrids(current.w); }
        function undo() { strokes.pop(); drawGrids(current.w); strokes.forEach(s => { if(s.length<1) return; ctx.beginPath(); ctx.moveTo(s[0].x, s[0].y); s.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke(); }); }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('game-time').innerText = `獎勵 ${(score/10)*30} 秒`;
            const done = totalCount - queue.length - retry.length;
            document.getElementById('progress-bar').style.width = (done / totalCount * 100) + "%";
            document.getElementById('progress-text').innerText = `${done}/${totalCount}`;
        }

        async function submit() {
            if (strokes.length < 1) return;
            document.getElementById('loading').classList.remove('hidden');
            const img = canvas.toDataURL('image/png').split(',')[1];
            const prompt = `你是國小老師。檢查圖中「${current.w}」國字與注音「${current.b}」是否正確。請嚴格批改，回傳純 JSON: {"correct": true/false, "msg": "一句話回饋"}`;
            
            try {
                // 使用 v1beta 通道搭配 gemini-1.5-flash
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: img } }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error.message || "連線失敗");
                }

                const data = await res.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);
                
                if (result.correct) { 
                    score += 10; 
                    document.getElementById('res-icon').innerText = "🌟"; 
                    document.getElementById('res-title').innerText = "完全正確！"; 
                    document.getElementById('res-title').className = "text-4xl font-black mb-4 text-green-500";
                } else { 
                    retry.push(current); 
                    document.getElementById('res-icon').innerText = "💡"; 
                    document.getElementById('res-title').innerText = "加油再試試"; 
                    document.getElementById('res-title').className = "text-4xl font-black mb-4 text-red-400";
                }
                
                document.getElementById('res-msg').innerText = result.msg;
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result-modal').classList.remove('hidden');
            } catch (e) {
                alert("批改失敗！原因：" + e.message + "\n若 Key 錯誤請點擊「重設 Key」。");
                document.getElementById('loading').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
